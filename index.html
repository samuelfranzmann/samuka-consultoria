<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Mentoria de Vocações - Samuka</title>
<style>
  :root{--red:#e8192c;--bg:#0a0a0a;--panel:#141414;--line:#262626;--gray:#9a9a9a}
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    background:var(--bg);color:#fff;
    font-family:'Lato','Arial',sans-serif;
    min-height:100vh;display:flex;align-items:center;justify-content:center;
    padding:24px;
  }
  .card{
    max-width:480px;width:100%;
    border:1px solid var(--line);
    border-left:3px solid var(--red);
    background:var(--panel);
    padding:40px 32px;
  }
  h1{
    font-family:'Archivo','Arial',sans-serif;
    font-size:22px;letter-spacing:.02em;margin-bottom:8px;
  }
  p.sub{color:var(--gray);font-size:13px;margin-bottom:32px}
  a.link{
    display:block;
    background:var(--red);color:#fff;text-decoration:none;
    padding:14px 18px;margin-bottom:12px;
    font-family:'Archivo','Arial',sans-serif;
    font-size:12px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;
    text-align:center;transition:background .15s;
  }
  a.link:hover{background:#c11322}
  a.link.secondary{background:transparent;border:1px solid var(--line);color:var(--gray)}
  a.link.secondary:hover{border-color:rgba(232,25,44,.4);color:#fff}
</style>
</head>
<body>
  <div class="card">
    <h1>Mentoria de Vocações</h1>
    <p class="sub">Selecione o formulário correspondente à sua consultoria.</p>
    <a class="link" href="monk_consultoria.html">Ficha Individual</a>
    <a class="link secondary" href="consultoria-pt.html">Ficha de Party (PT)</a>
  </div>
</body>
</html>
